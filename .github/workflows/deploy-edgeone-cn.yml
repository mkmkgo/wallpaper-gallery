name: Deploy to EdgeOne Pages (CN)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [wallpaper-updated]

permissions:
  contents: read
  deployments: write

concurrency:
  group: "edgeone-cn-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest CDN version
        id: cdn_version
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/mkmkgo/nuanXinProPic/tags" | jq -r '.[0].name // "v1.2.18"')
          echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "✅ Got latest CDN version: $LATEST_TAG"

      - name: Update CDN version in constants.js
        run: |
          CDN_VERSION="${{ steps.cdn_version.outputs.version }}"
          sed -i "s/export const CDN_VERSION = '[^']*'/export const CDN_VERSION = '$CDN_VERSION'/" src/utils/config/constants.js
          echo "📦 Updated constants.js to: $CDN_VERSION"

      - name: Checkout nuanXinProPic (wallpaper source)
        uses: actions/checkout@v4
        with:
          repository: mkmkgo/nuanXinProPic
          path: nuanXinProPic
          fetch-depth: 10

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy data from image repository
        run: |
          mkdir -p public/data
          if [ -d "nuanXinProPic/data" ]; then
            echo "📦 Copying data from nuanXinProPic/data..."
            for series in desktop mobile avatar; do
              if [ -d "nuanXinProPic/data/$series" ]; then
                cp -r "nuanXinProPic/data/$series" public/data/
              fi
              if [ -f "nuanXinProPic/data/$series.json" ]; then
                cp "nuanXinProPic/data/$series.json" public/data/
              fi
            done
            if [ -d "nuanXinProPic/bing/meta" ]; then
              mkdir -p public/data/bing
              cp -r nuanXinProPic/bing/meta/* public/data/bing/
            fi
            echo "✅ Data copied successfully"
          else
            echo "⚠️ Data directory not found, fallback to pnpm sync"
            pnpm sync
          fi

      - name: Sync wallpaper assets to Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm sync:assets

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm build:seo

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Create SPA fallback 404.html
        run: cp ./dist/index.html ./dist/404.html

      - name: Copy edgeone.json to dist
        run: cp ./edgeone.json ./dist/edgeone.json

      - name: Deploy to EdgeOne Pages (CN)
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🚀 Deploy attempt $i/$MAX_RETRIES..."
            if npx edgeone pages deploy ./dist \
              -n wallpaper-gallery-cn \
              -t ${{ secrets.EDGEONE_CN_API_TOKEN }} \
              -a global \
              -e production; then
              echo "✅ Deployment succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Deployment failed, waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done
          echo "❌ Deployment failed after $MAX_RETRIES attempts"
          exit 1
