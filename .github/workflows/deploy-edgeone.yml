name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天北京时间凌晨 02:00 自动运行一次 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "edgeone-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 获取图床仓库最新的 CDN 版本号
      - name: Get latest CDN version
        id: cdn_version
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/mkmkgo/nuanXinProPic/tags" | jq -r '.[0].name // "v1.2.18"')
          echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "? Got latest CDN version: $LATEST_TAG"

      # 2. 修改 constants.js 中的版本号
      - name: Update CDN version in constants.js
        run: |
          CDN_VERSION="${{ steps.cdn_version.outputs.version }}"
          sed -i "s/export const CDN_VERSION = '[^']*'/export const CDN_VERSION = '$CDN_VERSION'/" src/utils/config/constants.js
          echo "?? Updated constants.js to: $CDN_VERSION"

      # 3. 克隆图床仓库数据
      - name: Checkout nuanXinProPic (wallpaper source)
        uses: actions/checkout@v4
        with:
          repository: mkmkgo/nuanXinProPic
          path: nuanXinProPic
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 同步数据到 public 目录
      - name: Copy data from image repository
        run: |
          mkdir -p public/data
          if [ -d "nuanXinProPic/data" ]; then
            echo "?? Copying data from nuanXinProPic/data..."
            # 同步主系列
            for series in desktop mobile avatar; do
              if [ -d "nuanXinProPic/data/$series" ]; then
                cp -r "nuanXinProPic/data/$series" public/data/
              fi
              if [ -f "nuanXinProPic/data/$series.json" ]; then
                cp "nuanXinProPic/data/$series.json" public/data/
              fi
            done
            # 同步 Bing 数据
            if [ -d "nuanXinProPic/bing/meta" ]; then
              mkdir -p public/data/bing
              cp -r nuanXinProPic/bing/meta/* public/data/bing/
            fi
            echo "? Data copied successfully"
          else
            echo "?? Data directory not found, fallback to pnpm sync"
            pnpm sync
          fi

      - name: Sync wallpaper assets to Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm sync:assets

      # 5. 执行 Vite 打包构建
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm build:seo

      # 5.1 自动生成站点地图
      - name: Generate sitemap
        run: node scripts/generate-sitemap.js
        env:
          SITE_URL: https://wall.202597.xyz

      # 5.5 SPA fallback: 复制 index.html 为 404.html
      # EdgeOne Pages 不像 Cloudflare Pages 那样自动将未知路由回退到 index.html
      # 当请求 /auth/callback 等前端路由时，EdgeOne 找不到物理文件会返回 404
      # 将 index.html 复制为 404.html，使未知路径仍能加载 SPA，由 Vue Router 接管路由
      - name: Create SPA fallback 404.html
        run: cp ./dist/index.html ./dist/404.html

      # 5.6 复制 edgeone.json 到 dist 目录
      # edgeone.json 包含路由重写规则，需要包含在部署产物中
      - name: Copy edgeone.json to dist
        run: cp ./edgeone.json ./dist/edgeone.json

      # 6. 部署到 EdgeOne Pages
      - name: Deploy to EdgeOne Pages
        run: |
          npx edgeone pages deploy ./dist \
            -n wallpaper-gallery \
            -t ${{ secrets.EDGEONE_API_TOKEN }} \
            -a overseas \
            -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}

      # 7. CDN 缓存预热
      # 部署后主动请求最新图片 URL，让 CDN 边缘节点提前缓存
      # 新用户首次访问时图片就能从 CDN 缓存直接返回，无需回源 GitHub
      - name: Warmup CDN cache
        if: success()
        run: node scripts/warmup-cdn.js
        env:
          CDN_VERSION: ${{ steps.cdn-version.outputs.version || 'v1.1.29' }}

      # 8. 搜索引擎提交
      - name: Submit to search engines
        if: success()
        run: node scripts/submit-search-engines.js
        env:
          SITE_URL: https://wall.202597.xyz
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          BING_INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
