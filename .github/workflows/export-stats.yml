name: Export Stats

on:
  # 每天北京时间凌晨 1:30 执行（UTC 17:30），在图床同步后、deploy 之前
  schedule:
    - cron: '30 17 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  export-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export stats from Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/export-stats.js

      - name: Export hot tags from latest stats
        run: node scripts/export-hot-tags.js

      - name: Check for changes
        id: check_changes
        run: |
          git add public/data/stats/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: update stats data"
          git push

      - name: Push stats to CDN repository
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CDN_REPO="mkmkgo/nuanXinProPic"
          STATS_DIR="public/data/stats"

          echo "Cloning CDN repository: $CDN_REPO"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${CDN_REPO}.git" /tmp/cdn-repo

          echo "Copying stats files to CDN repository"
          mkdir -p "/tmp/cdn-repo/data/stats"
          cp -r "${STATS_DIR}/." "/tmp/cdn-repo/data/stats/"

          cd /tmp/cdn-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet; then
            echo "No changes to commit in CDN repo"
          else
            echo "Committing and pushing to CDN repository"
            git add data/stats/
            git commit -m "chore: sync stats data from wallpaper-gallery"
            git push
            echo "Successfully pushed stats to CDN repository"
          fi
