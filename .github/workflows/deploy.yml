name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [wallpaper-updated]

permissions:
  contents: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest CDN version
        id: cdn_version
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/mkmkgo/nuanXinProPic/tags" | jq -r '.[0].name // "v1.2.18"')
          echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "✅ Got latest CDN version: $LATEST_TAG"

      - name: Update CDN version in constants.js
        run: |
          CDN_VERSION="${{ steps.cdn_version.outputs.version }}"
          sed -i "s/export const CDN_VERSION = '[^']*'/export const CDN_VERSION = '$CDN_VERSION'/" src/utils/config/constants.js
          echo "📦 Updated constants.js to: $CDN_VERSION"

      - name: Checkout nuanXinProPic (wallpaper source)
        uses: actions/checkout@v4
        with:
          repository: mkmkgo/nuanXinProPic
          path: nuanXinProPic
          fetch-depth: 0
          token: ${{ secrets.NUANXINPROPIC_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy data from image repository
        run: |
          mkdir -p public/data
          if [ -d "nuanXinProPic/data" ]; then
            echo "📦 Copying data from nuanXinProPic/data..."
            for series in desktop mobile avatar; do
              if [ -d "nuanXinProPic/data/$series" ]; then
                cp -r "nuanXinProPic/data/$series" public/data/
              fi
              if [ -f "nuanXinProPic/data/$series.json" ]; then
                cp "nuanXinProPic/data/$series.json" public/data/
              fi
            done
            if [ -d "nuanXinProPic/bing/meta" ]; then
              mkdir -p public/data/bing
              cp -r nuanXinProPic/bing/meta/* public/data/bing/
            fi
            echo "✅ Data copied successfully"
          else
            echo "⚠️ Data directory not found, fallback to pnpm sync"
            pnpm sync
          fi

      - name: Sync wallpaper assets to Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm sync:assets

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm build:seo

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wallpaper-gallery-prod
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Ensure nuanXinProPic tag is up-to-date and purge CDN
        run: |
          cd nuanXinProPic
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_COMMIT=$(git rev-parse HEAD)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          TAG_COMMIT=""
          if [ -n "$LATEST_TAG" ]; then
            TAG_COMMIT=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null || echo "")
          fi

          echo "📌 Latest commit: $LATEST_COMMIT"
          echo "📌 Latest tag: $LATEST_TAG (points to: $TAG_COMMIT)"

          NEED_PURGE=false

          if [ "$LATEST_COMMIT" = "$TAG_COMMIT" ]; then
            echo "✅ Tag $LATEST_TAG already points to latest commit"
          else
            CURRENT_TAG=${LATEST_TAG:-v1.3.0}
            MAJOR=$(echo $CURRENT_TAG | cut -d. -f1)
            MINOR=$(echo $CURRENT_TAG | cut -d. -f2)
            PATCH=$(echo $CURRENT_TAG | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "🔄 Creating new tag $NEW_TAG at $LATEST_COMMIT..."
            git tag "$NEW_TAG" "$LATEST_COMMIT"
            git push origin "$NEW_TAG"
            echo "✅ Created new tag: $NEW_TAG"
            NEED_PURGE=true
          fi

          if [ "$NEED_PURGE" = true ]; then
            echo ""
            echo "🗑️ Purging jsDelivr CDN cache..."
            BASE="gh/mkmkgo/nuanXinProPic@latest"
            PURGE_PATHS=(
              "$BASE/data/mobile/latest.json"
              "$BASE/data/mobile/index.json"
              "$BASE/data/desktop/latest.json"
              "$BASE/data/desktop/index.json"
              "$BASE/data/avatar/latest.json"
              "$BASE/data/avatar/index.json"
              "$BASE/data/bing/latest.json"
              "$BASE/data/bing/index.json"
              "$BASE/data/collections.json"
              "$BASE/data/stats/hot-mobile.json"
            )
            for series in mobile desktop avatar; do
              if [ -d "data/$series" ]; then
                for f in data/$series/*.json; do
                  fname=$(basename "$f")
                  PURGE_PATHS+=("$BASE/data/$series/$fname")
                done
              fi
            done
            echo "🗑️ Purging ${#PURGE_PATHS[@]} CDN files..."
            for path in "${PURGE_PATHS[@]}"; do
              echo "  Purging $path..."
              curl -s "https://purge.jsdelivr.net/$path" | head -c 200
              echo ""
              sleep 0.5
            done
            echo "✅ CDN cache purge completed (total: ${#PURGE_PATHS[@]} files)"
          else
            echo "ℹ️ No CDN purge needed"
          fi
