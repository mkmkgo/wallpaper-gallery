name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest CDN version
        id: cdn_version
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/mkmkgo/nuanXinProPic/tags" | jq -r '.[0].name // "v1.2.18"')
          echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "✅ Got latest CDN version: $LATEST_TAG"

      - name: Update CDN version in constants.js
        run: |
          CDN_VERSION="${{ steps.cdn_version.outputs.version }}"
          sed -i "s/export const CDN_VERSION = '[^']*'/export const CDN_VERSION = '$CDN_VERSION'/" src/utils/config/constants.js
          echo "📦 Updated constants.js to: $CDN_VERSION"

      - name: Checkout nuanXinProPic (wallpaper source)
        uses: actions/checkout@v4
        with:
          repository: mkmkgo/nuanXinProPic
          path: nuanXinProPic
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy data from image repository
        run: |
          mkdir -p public/data
          if [ -d "nuanXinProPic/data" ]; then
            echo "📦 Copying data from nuanXinProPic/data..."
            for series in desktop mobile avatar; do
              if [ -d "nuanXinProPic/data/$series" ]; then
                cp -r "nuanXinProPic/data/$series" public/data/
              fi
              if [ -f "nuanXinProPic/data/$series.json" ]; then
                cp "nuanXinProPic/data/$series.json" public/data/
              fi
            done
            if [ -d "nuanXinProPic/bing/meta" ]; then
              mkdir -p public/data/bing
              cp -r nuanXinProPic/bing/meta/* public/data/bing/
            fi
            echo "✅ Data copied successfully"
          else
            echo "⚠️ Data directory not found, fallback to pnpm sync"
            pnpm sync
          fi

      - name: Sync wallpaper assets to Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm sync:assets

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm build:seo

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wallpaper-gallery-prod
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Purge jsDelivr CDN cache
        run: |
          BASE="gh/mkmkgo/nuanXinProPic@main"
          PURGE_PATHS=(
            "$BASE/data/mobile/latest.json"
            "$BASE/data/mobile/index.json"
            "$BASE/data/desktop/latest.json"
            "$BASE/data/desktop/index.json"
            "$BASE/data/avatar/latest.json"
            "$BASE/data/avatar/index.json"
            "$BASE/data/bing/latest.json"
            "$BASE/data/bing/index.json"
            "$BASE/data/collections.json"
            "$BASE/data/stats/hot-mobile.json"
          )
          for series in mobile desktop avatar; do
            if [ -d "nuanXinProPic/data/$series" ]; then
              for f in nuanXinProPic/data/$series/*.json; do
                fname=$(basename "$f")
                PURGE_PATHS+=("$BASE/data/$series/$fname")
              done
            fi
          done
          echo "🗑️ Purging ${#PURGE_PATHS[@]} CDN files..."
          for path in "${PURGE_PATHS[@]}"; do
            echo "  Purging $path..."
            curl -s "https://purge.jsdelivr.net/$path" | head -c 200
            echo ""
            sleep 0.5
          done
          echo "✅ CDN cache purge completed (total: ${#PURGE_PATHS[@]} files)"
